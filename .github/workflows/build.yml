name: Build & Package

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: cross-platform/windows-controller

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cross-platform/windows-controller/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type-check frontend
        run: npx tsc -p tsconfig.json --noEmit

      - name: Type-check Electron backend
        run: npx tsc -p tsconfig.electron.json --noEmit

      - name: Build frontend (Vite)
        run: npx vite build

      - name: Build Electron backend
        run: npx tsc -p tsconfig.electron.json

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Blitz-${{ github.sha }}
          path: |
            cross-platform/windows-controller/dist/
            cross-platform/windows-controller/dist-electron/

  package:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: cross-platform/windows-controller

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cross-platform/windows-controller/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build all
        run: npm run build:all

      - name: Package (electron-builder)
        run: npx electron-builder --win nsis

      - name: Generate checksums
        shell: pwsh
        run: |
          Get-ChildItem release/*.exe | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            "$hash  $($_.Name)" | Out-File -Append release/SHA256SUMS.txt -Encoding utf8
          }
          Get-Content release/SHA256SUMS.txt

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cross-platform/windows-controller/release/*.exe
            cross-platform/windows-controller/release/SHA256SUMS.txt
          body: |
            ## Install

            Download `Blitz-Setup-${{ steps.version.outputs.version }}.exe` and run the installer.

            ## Verify this build

            Download `SHA256SUMS.txt` and verify:
            ```powershell
            Get-FileHash Blitz-Setup-*.exe -Algorithm SHA256
            ```
